name: Manual Ingestion

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full re-ingestion (ignores cache)'
        required: false
        type: boolean
        default: false

jobs:
  run-ingestion:
    name: Run Remote Ingestion
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key.pem
        chmod 600 ~/.ssh/deploy_key.pem
        # Add host to known_hosts to prevent interactive prompt
        ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

    - name: Run Ingestion Script
      run: |
        if [ "${{ github.event.inputs.force }}" == "true" ]; then
          ./scripts/remote-ingest.sh ${{ secrets.DEPLOY_HOST }} ~/.ssh/deploy_key.pem -force
        else
          ./scripts/remote-ingest.sh ${{ secrets.DEPLOY_HOST }} ~/.ssh/deploy_key.pem
        fi

    - name: Cleanup SSH Key
      if: always()
      run: rm -f ~/.ssh/deploy_key.pem