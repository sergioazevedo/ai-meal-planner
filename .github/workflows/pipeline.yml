name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'sqlc.yaml'
      - 'internal/llm/testdata/**'
      - 'internal/recipe/*.md'
      - '.github/workflows/pipeline.yml'
  pull_request:
    branches: ["main"]
    paths:
      - '**/*.go'
      - '**/*.sql'
      - 'go.mod'
      - 'go.sum'
      - 'sqlc.yaml'
      - 'internal/llm/testdata/**'
      - 'internal/recipe/*.md'
      - '.github/workflows/pipeline.yml'

jobs:
  unit-tests:
    name: Run Unit Tests (Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Dependencies
        run: go mod download

      - name: Run Standard Unit Tests
        run: go test -short -v ./...

  ai-evals:
    name: Run Live AI Evals (Slow)
    needs: unit-tests # Only run evals if basic code logic passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Dependencies
        run: go mod download

      - name: Run Live AI Evals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
        run: go test -v ./internal/planner -run LiveEval -count=1 -timeout=10m

      - name: Run Live Tag Extraction Eval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: go test -v ./internal/recipe -run TestTagger_LiveEval -count=1 -timeout=2m

      - name: Run Live Retrieval Eval
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
        run: go test -v ./internal/llm -run TestVectorSearchQualityIntegration -count=1 -timeout=4m

  deploy-production:
    name: Deploy to Production
    needs: [unit-tests, ai-evals]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Dependencies
        run: go mod download

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          # Disable host key checking for the deploy host on this ephemeral runner
          printf "Host %s\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" "${{ secrets.DEPLOY_HOST }}" > ~/.ssh/config

      - name: Generate production .env
        run: |
          cat << EOF > .env
          GHOST_API_URL="${{ secrets.GHOST_API_URL }}"
          GHOST_CONTENT_API_KEY="${{ secrets.GHOST_CONTENT_API_KEY }}"
          GHOST_ADMIN_API_KEY="${{ secrets.GHOST_ADMIN_API_KEY }}"
          EMBEDDING_API_KEY="${{ secrets.EMBEDDING_API_KEY }}"
          GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_ALLOW_USER_ID="${{ secrets.TELEGRAM_ALLOW_USER_ID }}"
          TELEGRAM_WEBHOOK_URL="${{ secrets.TELEGRAM_WEBHOOK_URL }}"
          DEFAULT_ADULTS="${{ secrets.DEFAULT_ADULTS || '2' }}"
          DEFAULT_CHILDREN="${{ secrets.DEFAULT_CHILDREN || '1' }}"
          DEFAULT_CHILDREN_AGES="${{ secrets.DEFAULT_CHILDREN_AGES || '3' }}"
          DEFAULT_COOKING_FREQUENCY="${{ secrets.DEFAULT_COOKING_FREQUENCY || '5' }}"
          EOF

      - name: Run Deployment Script
        run: ./scripts/deploy.sh ${{ secrets.DEPLOY_HOST }} ~/.ssh/deploy_key.pem

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key.pem ~/.ssh/config
          rm -f .env
